# Base de données PostgreSQL pour le développement local.
# Démarrage : docker compose up -d
# Arrêt     : docker compose down
services:
  db:
    image: postgres:16
    container_name: sirh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sirh
      POSTGRES_PASSWORD: sirh_dev_pwd
      POSTGRES_DB: sirh_st_christopher
    ports:
      - "5432:5432"
    volumes:
      - sirh-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirh -d sirh_st_christopher"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sirh-pgdata:
